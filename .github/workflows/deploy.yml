name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restaurar dependencias
        run: dotnet restore BotiApp/BotiApp.csproj

      - name: Compilar
        run: dotnet build BotiApp/BotiApp.csproj -c Release --no-restore

      - name: Publicar
        run: dotnet publish BotiApp/BotiApp.csproj -c Release -o ./publish --no-build

      - name: Copiar archivos al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "publish/*, BotiApp/Dockerfile, BotiApp/docker-compose.yml"
          target: "/opt/botiapp"
          strip_components: 0

      - name: Desplegar en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /opt/botiapp
            docker compose down
            docker compose up -d --build
            docker image prune -f
